<script>
async function getProductData(){
  let products = [];
  try {
    const res = await fetch('./data/products.json');
    if(res.ok) products = await res.json();
  } catch (error) {
    console.warn('JSON load failed, falling back to JS data', error);
  }
  return products.length ? products : (window.PRODUCTS || []);
}

async function loadLatestProducts(){
  const list = document.getElementById('latest-products');
  const products = await getProductData();
  if(!products.length){
    list.textContent = 'Latest products are unavailable right now.';
    return;
  }

  list.innerHTML = products.slice(0, 3).map(p => `
    <a href="product.html?id=${encodeURIComponent(p.id)}" class="product-card bg-white p-6 text-center overflow-hidden block no-underline">
      <img
        class="product-image mx-auto h-52 object-cover rounded-md"
        src="${p.images[0]}"
        data-primary="${p.images[0]}"
        data-secondary="${p.images[1] || p.images[0]}"
        alt="${p.title}">
      <h3 class="serif italic text-2xl mt-6 text-black">${p.title}</h3>
      <div class="divider my-4"></div>
      <p class="font-medium text-black">$${p.price.toFixed(2)}</p>
    </a>
  `).join('');

  document.querySelectorAll('#latest-products .product-card').forEach(card => {
    const image = card.querySelector('img');
    const primary = image.dataset.primary;
    const secondary = image.dataset.secondary;
    card.addEventListener('mouseenter', () => { if (secondary) image.src = secondary; });
    card.addEventListener('mouseleave', () => { image.src = primary; });
  });
}

document.addEventListener('DOMContentLoaded', loadLatestProducts);
</script>
